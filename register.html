<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AssignTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Copy semua style dari atas (sama macam login page) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2e1065 0%, #2e1065 100%); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .register-container {
            width: 100%;
            max-width: 500px;
        }
        
        .register-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo i {
            font-size: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo h1 {
            font-size: 28px;
            color: #1e293b;
            margin-top: 10px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 500;
            font-size: 14px;
        }
        
        .input-group label i {
            margin-right: 8px;
            color: #8b5cf6;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .success-message {
            background: #dcfce7;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        
        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        
        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
        }
        
        .login-link a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">
                <i class="fa fa-user-plus"></i>
                <h1>Create Account</h1>
                <p>Join AssignTrack Today</p>
            </div>
            
            <div id="successMessage" class="success-message" style="display: none;"></div>
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <form id="registerForm">
                <div class="input-group">
                    <label><i class="fa fa-user"></i> Full Name</label>
                    <input type="text" id="fullname" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fa fa-user-circle"></i> Username</label>
                    <input type="text" id="username" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fa fa-envelope"></i> Email</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fa fa-lock"></i> Password</label>
                    <input type="password" id="password" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fa fa-lock"></i> Confirm Password</label>
                    <input type="password" id="confirm_password" required>
                </div>
                
                <button type="submit" class="btn-register">
                    <i class="fa fa-user-plus"></i> Register
                </button>
            </form>
            
            <div class="login-link">
                Already have an account? <a href="index.html">Login Here</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            
            // Validation
            if (password !== confirm_password) {
                showError('Passwords do not match!');
                return;
            }
            
            if (password.length < 4) {
                showError('Password must be at least 4 characters!');
                return;
            }
            
            // Get existing users
            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            // Check if username or email already exists
            if (users.find(u => u.username === username)) {
                showError('Username already exists!');
                return;
            }
            
            if (users.find(u => u.email === email)) {
                showError('Email already registered!');
                return;
            }
            
            // Create new user
            const newUser = {
                id: users.length + 1,
                username: username,
                email: email,
                password: password,
                fullname: fullname,
                member_since: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            // Show success message
            const successDiv = document.getElementById('successMessage');
            successDiv.innerHTML = '<i class="fa fa-check-circle"></i> Registration successful! Redirecting to login...';
            successDiv.style.display = 'block';
            
            // Redirect to login after 2 seconds
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerHTML = '<i class="fa fa-exclamation-circle"></i> ' + message;
            errorDiv.style.display = 'block';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
